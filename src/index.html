<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rater</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <h1 id="title">Album Data</h1>
    <br>

    <div id="mainLayout">
    <section class="searchSection">
        <span style="font-size:0.8rem">Search by </span>
        <b><button id="searchToggleBtn-Title">Title</button></b>
        <b><button id="searchToggleBtn-ID">Release ID</button></b>
        <div>
            <span id="inputType">
                <input type="text" id="searchInput" class="search-input" placeholder="Search for an album..." />
            </span>
        <button id="albumSearchBtn">Search</button>
        </div>

        <div id="resultsContainer">
        <ul id="results"></ul>
        </div>

        <span id="hiddenButtons"></span>
    </section>

    <section class="albumInfo">
        <div id="detail"></div>
        <div id="createPageBtnDiv"></div>
        <div id="tracklistPreview"></div>
    </section>

    <div id="hiddenLoadAlbum"></div>

    </div>

    <div>
    <ul id="albumList"></ul>
    </div>
    <script src="getalbuminfo.js"></script>

    <div id="albumInfoForm">
        <div id="albumInfoFormCoverContainer">
            <img src="" style="width: 100%; border-radius:5px;" id="miniCover">
        </div>
        <div>
        <form>
            <p style="font-size: 0.75rem; color:#800000; display: block" id="errorMessage"></p>
            <span id="subtle" style="font-size: 1.25rem">.../</span><input type="text" placeholder="page name" id="sanitizedTitleInput" class="create-page-inputs"><span id="subtle" style="font-size: 1.25rem">.page</span>
            <br>
            <br>
            <input type="text" placeholder="Album Title" id="titleInput" class="create-page-inputs">
            <br>
            <input type="text" placeholder="Artist" id="artistInput" class="create-page-inputs"> • <input type="number" placeholder="Year" id="yearInput" class="create-page-inputs">
            <br>
            <button id="createPageAfterValidationBtn">Confirm</button>
        </form>
        </div>

    </div>
</body>
</html>
